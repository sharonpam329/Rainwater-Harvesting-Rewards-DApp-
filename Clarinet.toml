[project]
name = "rainwater-harvesting-rewards"
description = "A smart contract system for incentivizing rainwater harvesting through token rewards"
authors = ["sharonpam329@gmail.com"]
telemetry = true
cache_dir = "./.clarinet"

[contracts.rainwater-rewards]
path = "contracts/rainwater-rewards.clar"
clarity_version = 3
epoch = "3.0"

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
